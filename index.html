<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Characters: Coin Collector</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <div id="ui-layer">
            <div class="stat-box"><i class="fas fa-clock"></i> <span id="timer">60</span>s</div>
            <div class="stat-box">P1: <span id="score">0</span> | P2: <span id="opp-score-ui">0</span></div>
        </div>

        <div id="menu-overlay" class="overlay">
            <h1>Characters</h1>
            <div id="setup-view">
                <p>Enter a 4-character Room ID:</p>
                <input type="text" id="custom-id-input" maxlength="4" placeholder="1234">
                <div class="button-group">
                    <button id="host-btn" class="btn">Host Room</button>
                    <button id="join-btn" class="btn secondary">Join Room</button>
                </div>
                <button id="start-bot" class="btn offline-btn">Play Offline (Bot)</button>
            </div>

            <div id="lobby-view" class="hidden">
                <p id="lobby-status">Waiting for connection...</p>
                <button id="trigger-start" class="btn success hidden">START GAME</button>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="mobile-controls">
            <div class="control-row"><button class="ctrl-btn" id="btn-up"><i class="fas fa-chevron-up"></i></button></div>
            <div class="control-row">
                <button class="ctrl-btn" id="btn-left"><i class="fas fa-chevron-left"></i></button>
                <button class="ctrl-btn" id="btn-down"><i class="fas fa-chevron-down"></i></button>
                <button class="ctrl-btn" id="btn-right"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>

        <div id="game-over" class="overlay hidden">
            <h2 id="winner-text">Match Ended!</h2>
            <p id="final-score-display"></p>
            <button onclick="location.reload()" class="btn">Play Again</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
